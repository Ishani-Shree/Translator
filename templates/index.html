<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceTranslate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
                    </svg>
                    <span>VoiceTranslate</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="card">
                <!-- Language Bar -->
                <div class="lang-bar">
                    <div class="lang-group">
                        <label class="lang-label">From</label>
                        <select id="source-lang" class="lang-select">
                            <option value="auto">Auto Detect</option>
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                        </select>
                    </div>

                    <button class="swap-btn" id="swap-btn" title="Swap languages">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                        </svg>
                    </button>

                    <div class="lang-group">
                        <label class="lang-label">To</label>
                        <select id="languages" class="lang-select">
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                        </select>
                    </div>
                </div>

                <!-- Panels -->
                <div class="panels">
                    <!-- Input Panel -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Source</span>
                            <button class="icon-btn" id="clear-btn" title="Clear text">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                    <path d="M18 6L6 18M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>

                        <textarea
                            id="input-text"
                            class="text-area"
                            placeholder="Type text or click the mic to speak..."
                            maxlength="5000"
                        ></textarea>

                        <div class="panel-footer">
                            <span class="char-count"><span id="char-count">0</span> / 5000</span>
                            <div class="panel-actions">
                                <button id="start-recording" class="btn btn-mic">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                                    </svg>
                                    Speak
                                </button>
                                <button id="stop-recording" class="btn btn-stop" style="display:none">
                                    <span class="rec-dot"></span>
                                    Stop
                                </button>
                                <button id="translate-btn" class="btn btn-primary">
                                    Translate
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 12h14M12 5l7 7-7 7"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="panel-divider"></div>

                    <!-- Output Panel -->
                    <div class="panel output-panel">
                        <div class="panel-header">
                            <span class="panel-title">Translation</span>
                            <button class="icon-btn" id="copy-btn" title="Copy" style="display:none">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                            </button>
                        </div>

                        <div id="empty-state" class="empty-state">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
                            </svg>
                            <p>Translation will appear here</p>
                        </div>

                        <div id="loading" class="loading" style="display:none">
                            <div class="spinner"></div>
                            <span>Translating...</span>
                        </div>

                        <div id="result-container" class="result" style="display:none">
                            <p id="translated-text" class="translated-output"></p>
                            <div class="output-actions">
                                <button id="listen-translation" class="btn btn-listen">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                    </svg>
                                    Listen
                                </button>
                            </div>
                        </div>

                        <audio id="translation-audio"></audio>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
