<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceTranslate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
                    </svg>
                    <span>VoiceTranslate</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="card">
                <!-- Language Bar -->
                <div class="lang-bar">
                    <div class="lang-group">
                        <label class="lang-label">From</label>
                        <select id="source-lang" class="lang-select">
                            <option value="auto">Auto Detect</option>
                            <optgroup label="── Global ──">
                                <option value="en">English</option>
                                <option value="fr">French</option>
                                <option value="es">Spanish</option>
                                <option value="ar">Arabic</option>
                                <option value="zh-cn">Chinese (Simplified)</option>
                                <option value="zh-tw">Chinese (Traditional)</option>
                                <option value="ru">Russian</option>
                                <option value="pt">Portuguese</option>
                                <option value="de">German</option>
                            </optgroup>
                            <optgroup label="── South Asia ──">
                                <option value="hi">Hindi</option>
                                <option value="bn">Bengali</option>
                                <option value="ur">Urdu</option>
                                <option value="pa">Punjabi</option>
                                <option value="ta">Tamil</option>
                                <option value="te">Telugu</option>
                                <option value="mr">Marathi</option>
                                <option value="gu">Gujarati</option>
                                <option value="kn">Kannada</option>
                                <option value="ml">Malayalam</option>
                                <option value="si">Sinhala</option>
                                <option value="ne">Nepali</option>
                            </optgroup>
                            <optgroup label="── East &amp; SE Asia ──">
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="vi">Vietnamese</option>
                                <option value="th">Thai</option>
                                <option value="id">Indonesian</option>
                                <option value="ms">Malay</option>
                                <option value="tl">Filipino</option>
                                <option value="my">Burmese</option>
                                <option value="km">Khmer</option>
                                <option value="lo">Lao</option>
                                <option value="mn">Mongolian</option>
                            </optgroup>
                            <optgroup label="── Europe ──">
                                <option value="it">Italian</option>
                                <option value="nl">Dutch</option>
                                <option value="pl">Polish</option>
                                <option value="sv">Swedish</option>
                                <option value="no">Norwegian</option>
                                <option value="da">Danish</option>
                                <option value="fi">Finnish</option>
                                <option value="el">Greek</option>
                                <option value="cs">Czech</option>
                                <option value="sk">Slovak</option>
                                <option value="hu">Hungarian</option>
                                <option value="ro">Romanian</option>
                                <option value="bg">Bulgarian</option>
                                <option value="hr">Croatian</option>
                                <option value="sr">Serbian</option>
                                <option value="uk">Ukrainian</option>
                                <option value="lt">Lithuanian</option>
                                <option value="lv">Latvian</option>
                                <option value="et">Estonian</option>
                                <option value="sl">Slovenian</option>
                                <option value="sq">Albanian</option>
                                <option value="mk">Macedonian</option>
                                <option value="be">Belarusian</option>
                                <option value="is">Icelandic</option>
                                <option value="ga">Irish</option>
                                <option value="cy">Welsh</option>
                                <option value="ca">Catalan</option>
                                <option value="lb">Luxembourgish</option>
                                <option value="mt">Maltese</option>
                            </optgroup>
                            <optgroup label="── Middle East &amp; Central Asia ──">
                                <option value="fa">Persian</option>
                                <option value="tr">Turkish</option>
                                <option value="iw">Hebrew</option>
                                <option value="az">Azerbaijani</option>
                                <option value="hy">Armenian</option>
                                <option value="ka">Georgian</option>
                                <option value="kk">Kazakh</option>
                                <option value="uz">Uzbek</option>
                                <option value="tg">Tajik</option>
                                <option value="ky">Kyrgyz</option>
                                <option value="tk">Turkmen</option>
                                <option value="ps">Pashto</option>
                                <option value="ku">Kurdish</option>
                            </optgroup>
                            <optgroup label="── Africa ──">
                                <option value="sw">Swahili</option>
                                <option value="am">Amharic</option>
                                <option value="ha">Hausa</option>
                                <option value="yo">Yoruba</option>
                                <option value="ig">Igbo</option>
                                <option value="zu">Zulu</option>
                                <option value="xh">Xhosa</option>
                                <option value="af">Afrikaans</option>
                                <option value="so">Somali</option>
                                <option value="mg">Malagasy</option>
                                <option value="rw">Kinyarwanda</option>
                                <option value="sn">Shona</option>
                                <option value="st">Sesotho</option>
                                <option value="ny">Chichewa</option>
                            </optgroup>
                            <optgroup label="── Americas ──">
                                <option value="ht">Haitian Creole</option>
                            </optgroup>
                            <optgroup label="── Pacific ──">
                                <option value="mi">Maori</option>
                                <option value="sm">Samoan</option>
                                <option value="haw">Hawaiian</option>
                            </optgroup>
                        </select>
                    </div>

                    <button class="swap-btn" id="swap-btn" title="Swap languages">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                        </svg>
                    </button>

                    <div class="lang-group">
                        <label class="lang-label">To</label>
                        <select id="languages" class="lang-select">
                            <optgroup label="── Global ──">
                                <option value="en">English</option>
                                <option value="fr">French</option>
                                <option value="es">Spanish</option>
                                <option value="ar">Arabic</option>
                                <option value="zh-cn">Chinese (Simplified)</option>
                                <option value="zh-tw">Chinese (Traditional)</option>
                                <option value="ru">Russian</option>
                                <option value="pt">Portuguese</option>
                                <option value="de">German</option>
                            </optgroup>
                            <optgroup label="── South Asia ──">
                                <option value="hi">Hindi</option>
                                <option value="bn">Bengali</option>
                                <option value="ur">Urdu</option>
                                <option value="pa">Punjabi</option>
                                <option value="ta">Tamil</option>
                                <option value="te">Telugu</option>
                                <option value="mr">Marathi</option>
                                <option value="gu">Gujarati</option>
                                <option value="kn">Kannada</option>
                                <option value="ml">Malayalam</option>
                                <option value="si">Sinhala</option>
                                <option value="ne">Nepali</option>
                            </optgroup>
                            <optgroup label="── East &amp; SE Asia ──">
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="vi">Vietnamese</option>
                                <option value="th">Thai</option>
                                <option value="id">Indonesian</option>
                                <option value="ms">Malay</option>
                                <option value="tl">Filipino</option>
                                <option value="my">Burmese</option>
                                <option value="km">Khmer</option>
                                <option value="lo">Lao</option>
                                <option value="mn">Mongolian</option>
                            </optgroup>
                            <optgroup label="── Europe ──">
                                <option value="it">Italian</option>
                                <option value="nl">Dutch</option>
                                <option value="pl">Polish</option>
                                <option value="sv">Swedish</option>
                                <option value="no">Norwegian</option>
                                <option value="da">Danish</option>
                                <option value="fi">Finnish</option>
                                <option value="el">Greek</option>
                                <option value="cs">Czech</option>
                                <option value="sk">Slovak</option>
                                <option value="hu">Hungarian</option>
                                <option value="ro">Romanian</option>
                                <option value="bg">Bulgarian</option>
                                <option value="hr">Croatian</option>
                                <option value="sr">Serbian</option>
                                <option value="uk">Ukrainian</option>
                                <option value="lt">Lithuanian</option>
                                <option value="lv">Latvian</option>
                                <option value="et">Estonian</option>
                                <option value="sl">Slovenian</option>
                                <option value="sq">Albanian</option>
                                <option value="mk">Macedonian</option>
                                <option value="be">Belarusian</option>
                                <option value="is">Icelandic</option>
                                <option value="ga">Irish</option>
                                <option value="cy">Welsh</option>
                                <option value="ca">Catalan</option>
                                <option value="lb">Luxembourgish</option>
                                <option value="mt">Maltese</option>
                            </optgroup>
                            <optgroup label="── Middle East &amp; Central Asia ──">
                                <option value="fa">Persian</option>
                                <option value="tr">Turkish</option>
                                <option value="iw">Hebrew</option>
                                <option value="az">Azerbaijani</option>
                                <option value="hy">Armenian</option>
                                <option value="ka">Georgian</option>
                                <option value="kk">Kazakh</option>
                                <option value="uz">Uzbek</option>
                                <option value="tg">Tajik</option>
                                <option value="ky">Kyrgyz</option>
                                <option value="tk">Turkmen</option>
                                <option value="ps">Pashto</option>
                                <option value="ku">Kurdish</option>
                            </optgroup>
                            <optgroup label="── Africa ──">
                                <option value="sw">Swahili</option>
                                <option value="am">Amharic</option>
                                <option value="ha">Hausa</option>
                                <option value="yo">Yoruba</option>
                                <option value="ig">Igbo</option>
                                <option value="zu">Zulu</option>
                                <option value="xh">Xhosa</option>
                                <option value="af">Afrikaans</option>
                                <option value="so">Somali</option>
                                <option value="mg">Malagasy</option>
                                <option value="rw">Kinyarwanda</option>
                                <option value="sn">Shona</option>
                                <option value="st">Sesotho</option>
                                <option value="ny">Chichewa</option>
                            </optgroup>
                            <optgroup label="── Americas ──">
                                <option value="ht">Haitian Creole</option>
                            </optgroup>
                            <optgroup label="── Pacific ──">
                                <option value="mi">Maori</option>
                                <option value="sm">Samoan</option>
                                <option value="haw">Hawaiian</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <!-- Panels -->
                <div class="panels">
                    <!-- Input Panel -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Source</span>
                            <button class="icon-btn" id="clear-btn" title="Clear text">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                    <path d="M18 6L6 18M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>

                        <textarea
                            id="input-text"
                            class="text-area"
                            placeholder="Type text or click the mic to speak..."
                            maxlength="5000"
                        ></textarea>

                        <div class="panel-footer">
                            <span class="char-count"><span id="char-count">0</span> / 5000</span>
                            <div class="panel-actions">
                                <button id="start-recording" class="btn btn-mic">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                                    </svg>
                                    Speak
                                </button>
                                <button id="stop-recording" class="btn btn-stop" style="display:none">
                                    <span class="rec-dot"></span>
                                    Stop
                                </button>
                                <button id="translate-btn" class="btn btn-primary">
                                    Translate
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 12h14M12 5l7 7-7 7"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="panel-divider"></div>

                    <!-- Output Panel -->
                    <div class="panel output-panel">
                        <div class="panel-header">
                            <span class="panel-title">Translation</span>
                            <button class="icon-btn" id="copy-btn" title="Copy" style="display:none">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                            </button>
                        </div>

                        <div id="empty-state" class="empty-state">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
                            </svg>
                            <p>Translation will appear here</p>
                        </div>

                        <div id="loading" class="loading" style="display:none">
                            <div class="spinner"></div>
                            <span>Translating...</span>
                        </div>

                        <div id="result-container" class="result" style="display:none">
                            <p id="translated-text" class="translated-output"></p>
                            <div class="output-actions">
                                <button id="listen-translation" class="btn btn-listen">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                    </svg>
                                    Listen
                                </button>
                            </div>
                        </div>

                        <audio id="translation-audio"></audio>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
